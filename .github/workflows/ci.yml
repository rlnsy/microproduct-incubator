name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Frontmatter validation
        run: npm run validate:frontmatter

      - name: Markdown lint
        run: npm run lint:markdown

      - name: Build (includes broken link checks)
        run: npm run build
